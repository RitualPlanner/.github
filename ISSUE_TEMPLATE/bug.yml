name: Bug Report
description: Report a bug or unexpected behaviour.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: List all steps.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser / Device

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots

  - type: textarea
    id: logs
    attributes:
      label: Logs
